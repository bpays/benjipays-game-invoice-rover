<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Benji Pays: Invoice Rover — Leaderboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;800;900&display=swap');
:root{--cerulean:#004777;--charcoal:#002843;--cooper:#CC7D51;--cameo:#D9B59D;--white:#F8F8F8;--good:#4DC97A;--muted:#7ba3be;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;background:var(--charcoal);font-family:'Barlow',sans-serif;color:var(--white);}
.page{max-width:480px;margin:0 auto;padding-bottom:100px;position:relative;}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-grad{position:absolute;inset:0;background:linear-gradient(180deg,#001e36 0%,var(--charcoal) 100%);}
.orb1{position:absolute;width:300px;height:300px;background:var(--cerulean);border-radius:50%;filter:blur(80px);opacity:.1;top:-60px;right:-80px;}
.orb2{position:absolute;width:200px;height:200px;background:var(--cooper);border-radius:50%;filter:blur(80px);opacity:.07;bottom:20%;left:-60px;}
header{position:relative;z-index:2;padding:18px 20px 0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.logo-wrap{display:flex;align-items:center;gap:8px;}
.logo-svg{height:26px;width:auto;}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--white);}
.timer-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.timer-lbl{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.timer{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:2px;line-height:1;}
.pulse{display:inline-block;width:6px;height:6px;background:var(--good);border-radius:50%;margin-right:4px;animation:pulse 1.4s ease-in-out infinite;vertical-align:middle;margin-bottom:2px;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
.title-block{text-align:center;padding:4px 0 6px;}
.eyebrow{font-size:9px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--cooper);margin-bottom:4px;}
.title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(44px,12vw,58px);line-height:.92;letter-spacing:-1px;text-transform:uppercase;}
.title .acc{color:var(--cooper);}
.live-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(77,201,122,.1);border:1px solid rgba(77,201,122,.3);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--good);text-transform:uppercase;margin-top:8px;}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:16px 20px 0;position:relative;z-index:2;}
.your-rank-section{position:relative;z-index:2;padding:16px 20px 0;}
.play-cta{border-radius:14px;padding:16px 20px;background:rgba(0,71,119,.12);border:1.5px dashed rgba(204,125,81,.35);display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;text-decoration:none;}
.play-cta-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.play-cta-text{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:var(--cameo);}
.board-section{position:relative;z-index:2;padding:18px 20px 0;}
.board-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.board-title{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.board-count{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.25);}
.rank-list{display:flex;flex-direction:column;gap:7px;}
.rank-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;background:linear-gradient(135deg,rgba(0,71,119,.14) 0%,rgba(0,40,67,.06) 100%);border:1px solid rgba(255,255,255,.07);position:relative;overflow:hidden;animation:rowIn .4s ease both;}
@keyframes rowIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.rank-row.r1{background:linear-gradient(135deg,rgba(255,215,0,.07) 0%,rgba(0,40,67,.08) 100%);border-color:rgba(255,215,0,.14);}
.rank-row.r1::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#FFD700,#b8960c);border-radius:12px 0 0 12px;}
.rank-row.r2{background:linear-gradient(135deg,rgba(192,192,192,.06) 0%,rgba(0,40,67,.08) 100%);border-color:rgba(192,192,192,.12);}
.rank-row.r2::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#C0C0C0,#888);border-radius:12px 0 0 12px;}
.rank-row.r3{background:linear-gradient(135deg,rgba(205,127,50,.06) 0%,rgba(0,40,67,.08) 100%);border-color:rgba(205,127,50,.12);}
.rank-row.r3::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#CD7F32,#8B4513);border-radius:12px 0 0 12px;}
.rank-badge{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;min-width:28px;text-align:center;line-height:1;}
.rank-badge.gold{color:#FFD700;}.rank-badge.silver{color:#C0C0C0;}.rank-badge.bronze{color:#CD7F32;}.rank-badge.plain{color:rgba(255,255,255,.3);font-size:14px;}
.rank-player{flex:1;min-width:0;}
.rank-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-meta{display:flex;align-items:center;gap:6px;margin-top:1px;font-size:10px;color:var(--muted);}
.rank-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.rank-score{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--white);}
.rank-combo{font-size:10px;color:var(--muted);}
.empty-state{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:12px;}
.empty-dog{font-size:64px;animation:float 2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.empty-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;text-align:center;}
.empty-sub{font-size:13px;color:var(--muted);text-align:center;}
.bottom-cta{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:12px 20px 20px;background:linear-gradient(0deg,var(--charcoal) 60%,transparent 100%);z-index:10;}
.cta-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--cooper),#004777);color:var(--white);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 28px rgba(204,125,81,.3);}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>
<div class="bg"><div class="bg-grad"></div><div class="orb1"></div><div class="orb2"></div></div>
<div class="page">
  <header>
    <div class="header-top">
      <div class="logo-wrap">
        <svg class="logo-svg" viewBox="100 155 600 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g clip-path="url(#lbs)"><path d="M250.228 178.284C248.008 178.325 245.87 178.867 244.019 180.199C241.758 181.782 240.606 183.947 240.771 186.737C241.593 199.771 246.404 209.848 255.08 219.467C255.944 220.425 256.314 221.341 256.273 222.59C256.191 225.963 256.232 229.295 256.273 232.668C256.273 233.625 255.944 233.875 254.998 233.958C253.6 234.042 252.819 233.542 252.079 232.293C244.8 220.05 234.438 211.763 220.992 207.474C212.768 204.851 204.338 204.393 195.826 205.767C193.441 206.267 192.989 207.433 194.017 209.182C195.703 212.138 197.43 215.095 198.951 218.135C201.295 222.84 202.899 227.795 204.132 232.876C204.338 233.667 204.091 233.958 203.31 233.958C201.007 233.958 198.704 233.917 196.443 233.958C195.456 234 195.127 233.584 194.798 232.668C193.4 228.67 192.249 224.506 190.439 220.716C184.271 207.724 174.772 197.897 162.19 191.109C152.362 185.821 141.876 183.197 130.732 183.239C128.8 183.239 126.826 183.197 124.893 183.239C123.989 183.281 123.413 182.906 123.043 182.073C122.138 180.158 121.151 175.785 120.247 173.911C119.63 172.62 120.165 171.704 121.604 171.704C125.058 171.663 128.512 171.663 131.966 171.704C133.282 171.788 137.682 169.081 139.08 167.207C139.614 166.499 140.231 166.166 141.095 166.208C142.411 166.249 143.685 166.249 145.001 166.208C146.07 166.166 146.934 166.582 147.674 167.332C149.113 168.789 149.812 170.58 149.936 172.62C150.224 177.326 153.76 180.741 158.242 180.657C161.449 180.616 164.451 178.45 165.603 175.244C165.89 174.494 166.26 174.161 167.042 174.244C205.448 174.244 219.758 174.244 256.643 174.244C257.095 174.244 257.794 174.078 258 174.494C258.206 174.952 257.548 175.41 257.219 175.744C256.273 176.618 254.587 178.2 250.228 178.284Z" fill="#F8F8F8"/></g>
          <path d="M325.065 215.879C325.065 218.993 324.467 221.624 323.27 223.772C322.074 225.866 320.488 227.557 318.511 228.846C316.535 230.134 314.273 231.074 311.724 231.664C309.228 232.201 306.653 232.47 304 232.47H282V175.45H304C306.133 175.45 308.317 175.691 310.554 176.174C312.79 176.604 314.819 177.383 316.639 178.51C318.459 179.584 319.942 181.06 321.086 182.94C322.23 184.819 322.802 187.208 322.802 190.107C322.802 193.275 321.97 195.906 320.306 198C318.641 200.04 316.457 201.517 313.752 202.43V202.591C315.313 202.859 316.769 203.369 318.121 204.121C319.526 204.819 320.722 205.732 321.71 206.859C322.75 207.987 323.556 209.302 324.129 210.805C324.753 212.309 325.065 214 325.065 215.879Z" fill="#F8F8F8"/>

          <path d="M473.1 212.98C473.1 215.235 472.84 217.597 472.32 220.067C471.852 222.537 470.942 224.819 469.589 226.913C468.289 228.953 466.443 230.644 464.05 231.987C461.71 233.329 458.667 234 454.922 234C450.241 234 446.341 232.765 443.22 230.295C440.099 227.772 438.019 224.55 436.979 220.631L448.759 216.523C449.123 218.027 449.773 219.235 450.709 220.148C451.698 221.06 452.894 221.517 454.298 221.517C456.483 221.517 457.913 220.738 458.589 219.181C459.317 217.624 459.681 215.584 459.681 213.06V175.45H473.1V212.98Z" fill="#F8F8F8"/>

        </svg>
      </div>
      <div class="timer-wrap">
        <div class="timer-lbl">Resets in</div>
        <div class="timer"><span class="pulse"></span><span id="timerDisplay">--:--:--</span></div>
      </div>
    </div>
    <div class="title-block">
      <div class="eyebrow">Invoice Rover · High Velocity Fintech Ledger</div>
      <div class="title">Daily<br><span class="acc">Leader</span>board</div>
      <div style="display:flex;justify-content:center;">
        <div class="live-pill"><span class="pulse" style="margin:0;width:5px;height:5px;"></span><span id="runnerCount">Loading...</span></div>
      </div>
    </div>
  </header>
  <div class="divider"></div>
  <div class="your-rank-section">
    <a class="play-cta" href="../game/">
      <div><div class="play-cta-label">Your Rank</div><div class="play-cta-text">Play to see your rank 🐾</div></div>
      <span style="font-size:32px">🐕</span>
    </a>
  </div>
  <div class="divider"></div>
  <div class="board-section">
    <div class="board-hdr">
      <div class="board-title">Top Runners</div>
      <div class="board-count" id="boardCount">Top 10 · Resets Daily</div>
    </div>
    <div class="rank-list" id="rankList">
      <div class="loading">Loading leaderboard...</div>
    </div>
  </div>
</div>
<div class="bottom-cta">
  <button class="cta-btn" onclick="window.location='../game/'">🐕 &nbsp;Run With Benji</button>
</div>
<script>
const SUPA_URL='https://cxnyfnudhsqrpknyfbft.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4bnlmbnVkaHNxcnBrbnlmYmZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDI4MDUsImV4cCI6MjA5MDcxODgwNX0.cMeJKKBsgfbRvjzNMpmBQ5R2fY67wL1E9kYOoGd0JZw';

async function fetchScores(){
  const res=await fetch(`${SUPA_URL}/rest/v1/scores?select=player_name,score,city_reached,city_flag,best_combo,created_at&flagged=eq.false&order=score.desc&limit=10`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}});
  return res.ok?await res.json():[];
}

async function fetchSettings(){
  const res=await fetch(`${SUPA_URL}/rest/v1/settings?select=key,value`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}});
  return res.ok?await res.json():[];
}

async function fetchCount(){
  const today=new Date();today.setHours(0,0,0,0);
  const res=await fetch(`${SUPA_URL}/rest/v1/scores?select=id&created_at=gte.${today.toISOString()}&flagged=eq.false`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Prefer':'count=exact','Range':'0-0'}});
  const count=res.headers.get('content-range')?.split('/')?.[1]||'0';
  return parseInt(count);
}

const medals=['🥇','🥈','🥉'];
const rClasses=['r1','r2','r3'];
const badgeClasses=['gold','silver','bronze'];

function renderList(scores){
  const list=document.getElementById('rankList');
  if(!scores.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-dog">🐕</div><div class="empty-title">No runs yet today.</div><div class="empty-sub">Be the first on the board! 🏁</div></div>`;
    return;
  }
  list.innerHTML='';
  scores.forEach((s,i)=>{
    const rank=i+1,isTop3=rank<=3;
    const row=document.createElement('div');
    row.className='rank-row'+(rClasses[i]?' '+rClasses[i]:'');
    row.style.animationDelay=(i*0.05)+'s';
    row.innerHTML=`
      <div class="rank-badge ${isTop3?badgeClasses[i]:'plain'}">${isTop3?medals[i]:rank}</div>
      <div class="rank-player">
        <div class="rank-name">${s.player_name}</div>
        <div class="rank-meta"><span>${s.city_flag||'🇨🇦'}</span><span>${s.city_reached||'Vancouver'}</span><span>· ${s.best_combo||0}× combo</span></div>
      </div>
      <div class="rank-right">
        <div class="rank-score">${(s.score||0).toLocaleString()}</div>
      </div>`;
    list.appendChild(row);
  });
}

// Countdown timer
function getSecsUntilReset(resetAt){
  const now=new Date(),reset=new Date(resetAt);
  if(isNaN(reset)||reset<now){
    // Default to midnight UTC
    const midnight=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()+1));
    return Math.floor((midnight-now)/1000);
  }
  return Math.floor((reset-now)/1000);
}
function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}

let resetSeconds=0;
setInterval(()=>{if(resetSeconds>0)resetSeconds--;document.getElementById('timerDisplay').textContent=fmt(resetSeconds);},1000);

// Load everything
(async()=>{
  const[scores,settings,count]=await Promise.all([fetchScores(),fetchSettings(),fetchCount()]);
  renderList(scores);
  document.getElementById('runnerCount').textContent=count+' runner'+(count===1?'':'s')+' today';
  document.getElementById('boardCount').textContent=`Top ${scores.length} · Resets Daily`;
  const resetSetting=settings.find(s=>s.key==='leaderboard_reset_at');
  resetSeconds=getSecsUntilReset(resetSetting?.value);
  document.getElementById('timerDisplay').textContent=fmt(resetSeconds);
})();

// Auto-refresh every 30 seconds
setInterval(async()=>{const scores=await fetchScores();renderList(scores);},30000);
</script>
</body>
</html>
